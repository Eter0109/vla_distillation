# ============================================================
# distill_config.yaml — 蒸馏训练配置
# 字段对齐 lerobot TrainPipelineConfig + DistillTrainPipelineConfig
# ============================================================

# ── 训练循环（对应 TrainPipelineConfig 顶层字段）────────────
batch_size: 2
steps: 1000
log_freq: 50
save_freq: 200
num_workers: 4
seed: 42
save_checkpoint: true
grad_accum_steps: 16        # 梯度累积（DistillTrainPipelineConfig 扩展字段）
student_path: /hqlab/workspace/zhaozy/models/smolvla_libero

# ── 数据集（DatasetConfig）──────────────────────────────────
dataset:
  repo_id: libero
  root: /hqlab/workspace/zhaozy/datasets/libero

# ── 优化器 & 调度器：由 distill.py 内联创建，不经过 draccus ────
# optimizer / scheduler 字段留空，use_policy_training_preset=false 触发代码内 AdamW + cosine
use_policy_training_preset: false

# ── 蒸馏配置（DistillConfig）────────────────────────────────
distill:
  # 损失权重
  alpha_task: 1.0
  alpha_distill: 0.5
  alpha_feature: 0.4
  alpha_logit: 0.6
  # 蒸馏开关
  feature_distill: true
  logit_distill: true
  # 预热步数（前 N 步只用 task loss）
  warmup_steps: 0
  temperature: 2.0
  # 教师模型
  teacher_path: /hqlab/workspace/zhaozy/models/xvla-libero-model
  teacher_device: cuda:1
  teacher_dtype: float16
  # 适配层维度
  student_vision_dim: 960
  teacher_vision_dim: 1024
  student_expert_dim: 480
  teacher_expert_dim: 1024
  student_action_dim: 7
  teacher_action_dim: 20

# ── 输出路径 ─────────────────────────────────────────────────
output_dir: outputs/distill

# ── WandB（WandBConfig）──────────────────────────────────────
wandb:
  enable: true
  project: vla_distillation
