# ============================================================
# distill_config.yaml — 蒸馏训练配置
# 字段对齐 lerobot TrainPipelineConfig + DistillTrainPipelineConfig
# ============================================================

# ── 训练循环（对应 TrainPipelineConfig 顶层字段）────────────
batch_size: 4
steps: 300000
log_freq: 50
save_freq: 200
num_workers: 4
seed: 42
save_checkpoint: true
grad_accum_steps: 32        # 梯度累积（DistillTrainPipelineConfig 扩展字段）
student_path: /home/eter/桌面/models/smolvla

# ── 数据集（DatasetConfig）──────────────────────────────────
dataset:
  repo_id: libero
  root: /home/eter/桌面/datasets/libero

# ── 优化器 & 调度器：由 distill.py 内联创建，不经过 draccus ────
# optimizer / scheduler 字段留空，use_policy_training_preset=false 触发代码内 AdamW + cosine
use_policy_training_preset: false

# ── 蒸馏配置（DistillConfig）────────────────────────────────
distill:
  # 损失权重
  alpha_task: 1.0
  alpha_distill: 0.2
  alpha_vision_feature: 0.2
  alpha_expert_feature: 0.2
  alpha_logit: 0.0
  # 蒸馏开关
  feature_distill: true
  vision_feature_distill: true
  expert_feature_distill: true
  logit_distill: false
  # 预热/爬坡步数（按 optimizer step 计）
  warmup_steps: 0
  distill_ramp_steps: 500
  temperature: 2.0
  action_distill_loss: mse
  action_distill_horizon: 1
  # 教师模型
  teacher_path: /home/eter/桌面/models/xvla-libero
  teacher_dtype: float16
  teacher_transformer_last_layer_attr: blocks
  # 适配层维度
  student_vision_dim: 960
  teacher_vision_dim: 1024
  student_expert_dim: 480
  teacher_expert_dim: 1024
  student_action_dim: 7
  teacher_action_dim: 20
  action_align_mode: teacher_abs20_to_student_rel7

# ── 输出路径 ─────────────────────────────────────────────────
output_dir: outputs/action_only_4_10

# ── WandB（WandBConfig）──────────────────────────────────────
wandb:
  enable: true
  project: vla_distillation
